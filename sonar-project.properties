# SonarCloud 프로젝트 정보
sonar.projectKey=rgkim-hsu_Smart-Agriculture
sonar.organization=rgkim-hsu

# 프로젝트 메타데이터
sonar.projectName=Smart Agriculture ThingsBoard
sonar.projectVersion=1.0

# Python 스크립트 위치
sonar.sources=.

# 테스트 (있다면)
sonar.tests=tests

# Python 커버리지
sonar.python.coverage.reportPaths=coverage.xml

# 제외
sonar.exclusions=**/__pycache__/**,**/venv/**,**/.env,**/data/**,**/*.txt,**/*.md,**/*.docx,**/*.pptx,**/*.mp4

# Python 버전
sonar.python.version=3.7,3.8,3.9,3.10